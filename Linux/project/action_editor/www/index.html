<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DARwIn-OP Action Editor Pro</title>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e;
            --text-main: #ffffff; --text-muted: #a0a0a0;
            --accent: #00e5ff; --accent-hover: #00b8cc;
            --danger: #ff4444; --success: #00C851;
        }
        /* Reduced base font size */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; font-size: 14px; }
        
        /* Tighter header and top controls */
        header { background: var(--panel-bg); padding: 8px 15px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between;}
        .top-controls { display: flex; gap: 10px; align-items: center;}
        .control-group { display: flex; align-items: center; gap: 5px; background: #000; padding: 4px 8px; border-radius: 4px; }
        .control-group input { width: 45px; background: transparent; color: var(--accent); border: none; font-weight: bold; text-align: center; font-size: 1rem; }
        
        /* Tighter buttons */
        button { background: #333; color: #fff; border: 1px solid #555; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 0.85rem;}
        button:hover { background: #444; }
        .btn-play { background: var(--accent); color: #000; }
        .btn-play:hover { background: var(--accent-hover); }

        /* Tighter step bar */
        .step-bar { background: #222; padding: 6px 15px; display: flex; gap: 5px; align-items: center; border-bottom: 1px solid #333; }
        .step-btn { padding: 4px 12px; background: #111; color: var(--text-muted); border: 1px solid #333; }
        .step-btn.active { background: var(--accent); color: #000; }
        
        /* Tighter grid and panels */
        .main-content { flex: 1; padding: 10px 15px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 15px; align-items: start; }
        .joint-group { background: var(--panel-bg); border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        /* Tighter sliders */
        .slider-row { display: flex; align-items: center; margin-bottom: 6px; gap: 6px; }
        .slider-row label { width: 90px; font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .slider-row input[type="range"] { flex: 1; cursor: pointer; margin: 0; }
        .val-display { width: 40px; text-align: right; font-family: monospace; background: #000; padding: 2px 4px; border-radius: 4px; color: var(--text-main); font-size: 0.9rem;}
        .val-invalid { color: var(--danger); }
        .btn-torque { font-size: 0.65rem; padding: 2px 4px; background: var(--success); }
        .btn-torque.off { background: var(--danger); }

        /* NEW: Glowing Animation for the Play Step button */
       @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.8); }
            70% { box-shadow: 0 0 0 12px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
        .needs-action {
            animation: pulse-glow 1.5s infinite;
            border: 2px solid #fff !important;
        }

        /* Glowing Animation for the Main File Save Button */
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.8); }
            70% { box-shadow: 0 0 0 12px rgba(243, 156, 18, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0); }
        }
        .needs-file-save {
            animation: pulse-orange 1.5s infinite;
            background: #f39c12 !important; /* Bright Orange */
            color: #000 !important;
            border: 2px solid #fff !important;
        }
    </style>
</head>
<body>

    <header>
        <h2>🤖 Action Editor</h2>
        <div class="top-controls">
            <div class="control-group">
                <label>Page:</label>
                <select id="select-page" onchange="loadPage(this.value)" style="background:#111; color:var(--accent); border:1px solid #333; padding:4px; font-weight:bold;"></select>
            </div>
            
            <div class="control-group">
                <label>Name:</label>
                <input type="text" id="inp-name" maxlength="14" style="width:120px;">
                <button onclick="renamePage()" style="background:#444;">Rename</button>
                <button onclick="newPage()" style="background:var(--danger);">New/Clear</button>
            </div>

            <div class="control-group">
                <label>Speed:</label>
                <input type="number" id="inp-speed" onchange="updatePageParam('speed', this.value)">
            </div>
            <div class="control-group">
                <label>Accel:</label>
                <input type="number" id="inp-accel" onchange="updatePageParam('accel', this.value)">
            </div>

            <button id="btn-main-save" onclick="saveToFile()" style="background:#444; color:#fff; font-weight:bold;">💾 Saved</button>
            <button class="btn-play" onclick="playAction()">▶ Play Action</button>
        </div>
    </header>

    <div class="step-bar">
        <span id="current-step-label" style="font-weight:900; color:var(--accent); font-size:1.3rem; min-width:180px; text-transform:uppercase;">
            MODE: LIVE (STP 7)
        </span>
        <button class="step-btn" id="btn-step-0" onclick="setStep(0)">STP 0</button>
        <button class="step-btn" id="btn-step-1" onclick="setStep(1)">STP 1</button>
        <button class="step-btn" id="btn-step-2" onclick="setStep(2)">STP 2</button>
        <button class="step-btn" id="btn-step-3" onclick="setStep(3)">STP 3</button>
        <button class="step-btn" id="btn-step-4" onclick="setStep(4)">STP 4</button>
        <button class="step-btn" id="btn-step-5" onclick="setStep(5)">STP 5</button>
        <button class="step-btn" id="btn-step-6" onclick="setStep(6)">STP 6</button>
        <button class="step-btn active" id="btn-step-7" onclick="setStep(7)">STP 7 (Live Robot)</button>

        <div style="flex:1"></div>
        <button id="btn-copy-step" onclick="copyWholeStep()" style="background:#444; color:#fff; display:none; margin-right: 5px;">📄 Copy Step</button>
        <button id="btn-paste-step" onclick="pasteWholeStep()" style="background:#444; color:#fff; display:none; margin-right: 15px;">📋 Paste Step</button>
        <button id="btn-delete-step" onclick="deleteCurrentStep()" style="background:var(--danger); color:#fff; display:none; margin-right: 10px;">🗑️ Delete Step</button>
        <button id="btn-play-step" onclick="playSingleStep()" style="background:var(--accent); color:#000; display:none; margin-right: 5px;">▶ Play Step</button>
        <button id="btn-save-step" onclick="saveLiveToCurrentStep()" style="background:#444; color:#fff; font-weight:bold; display:none; margin-right: 10px;">📸 Save Step</button>
        <button onclick="readRobot()" style="background:#444;">Read Position to STP 7</button>
    </div>
    <div style="background: #0a0a0a; padding: 6px 15px; border-bottom: 1px solid #333; display: flex; gap: 20px; align-items: center;">
        <span style="color: var(--accent); font-weight: bold; font-size: 0.85rem; letter-spacing: 1px;">⚙️ STEP SETTINGS:</span>
        
        <div class="control-group" style="background: #1a1a1a;">
            <label style="color: var(--text-muted); font-size: 0.8rem;">Move Time (x8ms):</label>
            <input type="number" id="inp-step-time" min="0" max="255" onchange="updateStepParam('time', this.value)" style="width:50px;">
        </div>
        
        <div class="control-group" style="background: #1a1a1a;">
            <label style="color: var(--text-muted); font-size: 0.8rem;">Pause Time (x8ms):</label>
            <input type="number" id="inp-step-pause" min="0" max="255" onchange="updateStepParam('pause', this.value)" style="width:50px;">
        </div>
        
        <span style="font-size: 0.75rem; color: #555;">(Tip: Value of 125 = 1.0 second)</span>
    </div>

    <div class="main-content" id="sliders-container"></div>

    <script src="functions.js"></script>
</body>
</html>
